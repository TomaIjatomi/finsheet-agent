name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --extra dev --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Build bench (sanity check)
        run: uv run python -m bench.build

      - name: Run tests
        run: uv run pytest -q --cov=bench --cov-report=term-missing
