<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FinSheet Agent system architecture: user question and workbook are processed by Schema, Decomposition, and Computation agents. The Computation Agent runs a deterministic prelude, LLM-generated pandas code, and a Docker sandbox with retry on error. Schema calls get_sheet_schema; Computation calls execute_python which runs in the Docker sandbox runtime. Outputs are a final answer plus Fact Sheet audit trail.">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12101a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a09bb0"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6580"/>
    </marker>
    <marker id="arrowRetry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97066"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="48" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" fill="#f0edf5" text-anchor="middle">FinSheet Agent — System Architecture</text>
  <text x="600" y="74" font-family="'DM Sans', system-ui, sans-serif" font-size="13" fill="#a09bb0" text-anchor="middle">Multi-agent pipeline with deterministic tools served via MCP</text>

  <!-- ============ INPUTS ============ -->
  <text x="60" y="118" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b6580" letter-spacing="2">INPUTS</text>

  <g>
    <rect x="60" y="140" width="140" height="48" rx="24" fill="rgba(139,47,201,0.08)" stroke="#8B2FC9" stroke-width="1.5"/>
    <text x="130" y="166" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0edf5" text-anchor="middle">User Question</text>
    <text x="130" y="181" font-family="'JetBrains Mono', Menlo, monospace" font-size="10" fill="#a09bb0" text-anchor="middle">natural language</text>
  </g>

  <g>
    <rect x="60" y="208" width="140" height="48" rx="6" fill="rgba(217,70,168,0.08)" stroke="#d946a8" stroke-width="1.5"/>
    <text x="130" y="234" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0edf5" text-anchor="middle">Workbook</text>
    <text x="130" y="249" font-family="'JetBrains Mono', Menlo, monospace" font-size="10" fill="#a09bb0" text-anchor="middle">.xlsx file</text>
  </g>

  <line x1="205" y1="198" x2="245" y2="198" stroke="#a09bb0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ AGENT LAYER ============ -->
  <text x="250" y="118" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b6580" letter-spacing="2">AGENT LAYER</text>

  <!-- Schema Agent -->
  <g>
    <rect x="250" y="160" width="150" height="80" rx="6" fill="rgba(217,70,168,0.08)" stroke="#d946a8" stroke-width="1.5"/>
    <circle cx="267" cy="177" r="4" fill="#d946a8"/>
    <text x="277" y="181" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="500" fill="#d946a8">DETERMINISTIC</text>
    <text x="325" y="205" font-family="'DM Sans', system-ui, sans-serif" font-size="15" font-weight="600" fill="#f0edf5" text-anchor="middle">Schema Agent</text>
    <text x="325" y="225" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#a09bb0" text-anchor="middle">profiles workbook</text>
  </g>

  <line x1="405" y1="200" x2="445" y2="200" stroke="#a09bb0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decomposition Agent -->
  <g>
    <rect x="450" y="160" width="170" height="80" rx="6" fill="rgba(139,47,201,0.08)" stroke="#8B2FC9" stroke-width="1.5"/>
    <circle cx="467" cy="177" r="4" fill="#8B2FC9"/>
    <text x="477" y="181" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="500" fill="#a855f7">GEMINI 2.5 PRO</text>
    <text x="535" y="205" font-family="'DM Sans', system-ui, sans-serif" font-size="15" font-weight="600" fill="#f0edf5" text-anchor="middle">Decomposition</text>
    <text x="535" y="225" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#a09bb0" text-anchor="middle">question → subgoals</text>
  </g>

  <line x1="625" y1="200" x2="665" y2="200" stroke="#a09bb0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ COMPUTATION AGENT (with separated tag + title rows) ============ -->
  <g>
    <rect x="670" y="130" width="370" height="210" rx="8" fill="rgba(139,47,201,0.05)" stroke="#8B2FC9" stroke-width="1.5"/>

    <!-- Row 1: tag at top -->
    <circle cx="687" cy="155" r="4" fill="#8B2FC9"/>
    <text x="697" y="159" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="500" fill="#a855f7">GEMINI 2.5 PRO + DOCKER SANDBOX</text>

    <!-- Row 2: title centered, separate line -->
    <text x="855" y="184" font-family="'DM Sans', system-ui, sans-serif" font-size="15" font-weight="600" fill="#f0edf5" text-anchor="middle">Computation Agent</text>

    <!-- Row 3: three internal pills -->
    <g transform="translate(685, 210)">
      <rect width="100" height="42" rx="4" fill="rgba(217,70,168,0.12)" stroke="#d946a8" stroke-width="1.2"/>
      <text x="50" y="19" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#f0edf5" text-anchor="middle">Prelude</text>
      <text x="50" y="33" font-family="'DM Sans', system-ui, sans-serif" font-size="9" fill="#d946a8" text-anchor="middle">deterministic</text>
    </g>
    <line x1="790" y1="231" x2="815" y2="231" stroke="#a09bb0" stroke-width="1.3" marker-end="url(#arrow)"/>

    <g transform="translate(820, 210)">
      <rect width="100" height="42" rx="4" fill="rgba(139,47,201,0.15)" stroke="#8B2FC9" stroke-width="1.2"/>
      <text x="50" y="19" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#f0edf5" text-anchor="middle">LLM Codegen</text>
      <text x="50" y="33" font-family="'DM Sans', system-ui, sans-serif" font-size="9" fill="#a855f7" text-anchor="middle">chained pandas</text>
    </g>
    <line x1="925" y1="231" x2="950" y2="231" stroke="#a09bb0" stroke-width="1.3" marker-end="url(#arrow)"/>

    <g transform="translate(955, 210)">
      <rect width="75" height="42" rx="4" fill="rgba(249,112,102,0.12)" stroke="#f97066" stroke-width="1.2"/>
      <text x="37" y="19" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#f0edf5" text-anchor="middle">Sandbox</text>
      <text x="37" y="33" font-family="'DM Sans', system-ui, sans-serif" font-size="9" fill="#f97066" text-anchor="middle">Docker</text>
    </g>

    <!-- Retry loop with more headroom -->
    <path d="M 992 255 Q 992 290 870 290 Q 820 290 820 255" stroke="#f97066" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRetry)"/>
    <text x="900" y="312" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#f97066" text-anchor="middle" font-style="italic">retry on sandbox error</text>
  </g>

  <line x1="1045" y1="195" x2="1075" y2="180" stroke="#a09bb0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1045" y1="240" x2="1075" y2="255" stroke="#a09bb0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ OUTPUTS ============ -->
  <text x="1080" y="118" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b6580" letter-spacing="2">OUTPUTS</text>

  <g>
    <rect x="1080" y="155" width="115" height="44" rx="22" fill="rgba(249,112,102,0.12)" stroke="#f97066" stroke-width="1.5"/>
    <text x="1137" y="182" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0edf5" text-anchor="middle">Final Answer</text>
  </g>

  <g>
    <rect x="1080" y="230" width="115" height="44" rx="6" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="1137" y="250" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0edf5" text-anchor="middle">Fact Sheet</text>
    <text x="1137" y="264" font-family="'JetBrains Mono', Menlo, monospace" font-size="9" fill="#a09bb0" text-anchor="middle">audit trail</text>
  </g>

  <!-- ============ MCP CONNECTION ARROWS (from agents down to MCP tools) ============ -->
  <!-- Schema → get_sheet_schema (vertical, aligned) -->
  <line x1="325" y1="240" x2="325" y2="421" stroke="#6b6580" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDim)"/>

  <!-- Computation Agent → execute_python (vertical, aligned) -->
  <line x1="750" y1="340" x2="750" y2="421" stroke="#6b6580" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDim)"/>

  <!-- ============ MCP TOOL SURFACE ============ -->
  <text x="60" y="395" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b6580" letter-spacing="2">MCP TOOL SURFACE</text>

  <g>
    <rect x="60" y="408" width="1135" height="60" rx="8" fill="rgba(168,85,247,0.04)" stroke="rgba(168,85,247,0.25)" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- get_sheet_schema centered under Schema (x=325) -->
    <g transform="translate(235, 422)">
      <rect width="180" height="32" rx="16" fill="rgba(139,47,201,0.12)" stroke="#8B2FC9" stroke-width="1"/>
      <text x="90" y="21" font-family="'JetBrains Mono', Menlo, monospace" font-size="11" fill="#f0edf5" text-anchor="middle">get_sheet_schema</text>
    </g>

    <!-- get_range -->
    <g transform="translate(440, 422)">
      <rect width="180" height="32" rx="16" fill="rgba(139,47,201,0.12)" stroke="#8B2FC9" stroke-width="1"/>
      <text x="90" y="21" font-family="'JetBrains Mono', Menlo, monospace" font-size="11" fill="#f0edf5" text-anchor="middle">get_range</text>
    </g>

    <!-- execute_python centered at x=750 (aligned with Comp Agent arrow) -->
    <g transform="translate(660, 422)">
      <rect width="180" height="32" rx="16" fill="rgba(217,70,168,0.15)" stroke="#d946a8" stroke-width="1.2"/>
      <text x="90" y="21" font-family="'JetBrains Mono', Menlo, monospace" font-size="11" fill="#f0edf5" text-anchor="middle">execute_python</text>
    </g>

    <!-- cite_cells -->
    <g transform="translate(865, 422)">
      <rect width="180" height="32" rx="16" fill="rgba(139,47,201,0.12)" stroke="#8B2FC9" stroke-width="1"/>
      <text x="90" y="21" font-family="'JetBrains Mono', Menlo, monospace" font-size="11" fill="#f0edf5" text-anchor="middle">cite_cells</text>
    </g>
  </g>

  <!-- execute_python → Docker Sandbox (vertical, aligned) -->
  <line x1="750" y1="454" x2="750" y2="515" stroke="#6b6580" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDim)"/>

  <!-- ============ EXECUTION RUNTIME ============ -->
  <text x="60" y="503" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b6580" letter-spacing="2">EXECUTION RUNTIME</text>

  <g>
    <rect x="60" y="515" width="1135" height="68" rx="8" fill="rgba(249,112,102,0.06)" stroke="#f97066" stroke-width="1.5"/>
    <circle cx="78" cy="538" r="4" fill="#f97066"/>
    <text x="88" y="542" font-family="'DM Sans', system-ui, sans-serif" font-size="10" font-weight="500" fill="#f97066">DOCKER SANDBOX</text>
    <text x="627" y="544" font-family="'DM Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0edf5" text-anchor="middle">python:3.12-slim · pandas · numpy</text>
    <text x="627" y="568" font-family="'JetBrains Mono', Menlo, monospace" font-size="10" fill="#a09bb0" text-anchor="middle">--read-only · --network=none · --memory=512m · fresh container per call · non-root user</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(60, 625)">
    <circle cx="0" cy="0" r="5" fill="#d946a8"/>
    <text x="12" y="4" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#a09bb0">Deterministic</text>

    <circle cx="130" cy="0" r="5" fill="#8B2FC9"/>
    <text x="142" y="4" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#a09bb0">LLM-driven (Gemini 2.5 Pro)</text>

    <circle cx="340" cy="0" r="5" fill="#f97066"/>
    <text x="352" y="4" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#a09bb0">Code execution (sandboxed)</text>

    <line x1="570" y1="0" x2="610" y2="0" stroke="#6b6580" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="620" y="4" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#a09bb0">MCP / runtime call</text>

    <line x1="800" y1="0" x2="840" y2="0" stroke="#f97066" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="850" y="4" font-family="'DM Sans', system-ui, sans-serif" font-size="11" fill="#a09bb0">Retry on error</text>
  </g>

  <text x="1140" y="690" font-family="'DM Sans', system-ui, sans-serif" font-size="10" fill="#6b6580" text-anchor="end">tomaijatomi.com · FinSheet Agent</text>
</svg>
